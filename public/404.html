<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Hall Pass</title>
    <script>
      // GitHub Pages SPA workaround
      // Stores the path in sessionStorage then redirects to the root
      var path = window.location.pathname;
      var base = '/hallpass';
      var route = path.replace(base, '') || '/';
      sessionStorage.setItem('redirect', route);
      window.location.replace(base + '/');
    </script>
  </head>
</html>
